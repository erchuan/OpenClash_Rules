# ================= 基础配置 =================
port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# ================= 节点（订阅） =================
# 👉 只负责节点，不参与规则
proxy-providers:
  myproxy:
    type: http
    url: {{ .Proxy }}
    path: ./providers/proxies.yaml
    interval: 3600

# ================= 策略组 =================
# 👉 所有策略组名称必须和 rules 里的一致！

proxy-groups:

  - name: 🔓 手动直连
    type: select
    proxies: [DIRECT, ♻️ 自动选择]

  - name: ⚡ 手动代理
    type: select
    use: [myproxy]
    proxies: [DIRECT]

  - name: 🚦 禁止连接
    type: select
    proxies: [REJECT, DIRECT]

  - name: 🪙 数字货币
    type: select
    use: [myproxy]

  - name: 🐙 GitHub
    type: select
    use: [myproxy]

  - name: 🎭 Telegram
    type: select
    use: [myproxy]

  - name: 🕊️ Twitter(X)
    type: select
    use: [myproxy]

  - name: ✨ OpenAI
    type: select
    use: [myproxy]

  - name: ✴️ Anthropic
    type: select
    use: [myproxy]

  - name: 🤖 Copilot
    type: select
    use: [myproxy]

  - name: ▶️ YouTube
    type: select
    use: [myproxy]

  - name: 🍿 Netflix
    type: select
    use: [myproxy]

  - name: 🎶 Spotify
    type: select
    use: [myproxy]

  - name: 📰 国外媒体
    type: select
    use: [myproxy]

  - name: 🌐 Google
    type: select
    use: [myproxy]

  - name: 🍎 苹果服务
    type: select
    proxies: [DIRECT]

  - name: Ⓜ️ 微软服务
    type: select
    use: [myproxy]

  - name: 🐟 漏网之鱼
    type: select
    use: [myproxy]
    proxies: [DIRECT]

  - name: ♻️ 自动选择
    type: url-test
    use: [myproxy]
    url: http://cp.cloudflare.com/generate_204
    interval: 300

# ================= 规则提供者 =================
# 👉 每一个 ruleset 对应一个 provider（必须一一对应！）

rule-providers:

  # ===== 自定义规则 =====
  CustomDirect:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/erchuan/OpenClash_Rules/main/Custom_Direct.list
