# ================= 规则 =================
rules:

  # ===== 手动规则 =====
  - RULE-SET,CustomDirect,🔓 手动直连
  - RULE-SET,CustomReject,🚦 禁止连接
  - RULE-SET,CustomProxy,⚡ 手动代理
  - RULE-SET,PayPal,⚡ 手动代理
  - RULE-SET,Wikipedia,⚡ 手动代理

  # ===== Google =====
  - RULE-SET,GoogleFCM,🌐 Google
  - RULE-SET,Google,🌐 Google

  # ===== AI =====
  - RULE-SET,OpenAI,✨ OpenAI
  - RULE-SET,OpenAI_Sora,✨ OpenAI
  - RULE-SET,Anthropic,✴️ Anthropic
  - RULE-SET,Copilot,🤖 Copilot

  # ===== 社交 =====
  - RULE-SET,Telegram,🎭 Telegram
  - RULE-SET,Twitter,🕊️ Twitter(X)

  # ===== 服务 =====
  - RULE-SET,GitHub,🐙 GitHub
  - RULE-SET,Apple,🍎 苹果服务
  - RULE-SET,Microsoft,Ⓜ️ 微软服务

  # ===== 流媒体 =====
  - RULE-SET,YouTube,▶️ YouTube
  - RULE-SET,Netflix,🍿 Netflix
  - RULE-SET,Spotify,🎶 Spotify
  - RULE-SET,GlobalMedia,📰 国外媒体

  # ===== 默认 =====
  - GEOIP,CN,DIRECT
  - MATCH,🐟 漏网之鱼
